services:
  db:
    image: postgres:16-alpine
    container_name: saas-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-saas_billing}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-saas_billing}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: saas-redis
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: saas-backend
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      RUN_BOOTSTRAP_TASKS: "true"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-unsafe-dev-secret}
      DJANGO_DEBUG: "false"
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,nginx,backend}
      POSTGRES_DB: ${POSTGRES_DB:-saas_billing}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      BACKEND_PUBLIC_URL: ${BACKEND_PUBLIC_URL:-http://localhost}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost,http://127.0.0.1}
      SECURE_SSL_REDIRECT: ${SECURE_SSL_REDIRECT:-false}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_static:/app/staticfiles
      - backend_media:/app/media
    healthcheck:
      test: ["CMD-SHELL", "python manage.py check --database default"]
      interval: 20s
      timeout: 10s
      retries: 5

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: saas-celery
    command: celery -A config worker -l info
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      RUN_BOOTSTRAP_TASKS: "false"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-unsafe-dev-secret}
      DJANGO_DEBUG: "false"
      POSTGRES_DB: ${POSTGRES_DB:-saas_billing}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      BACKEND_PUBLIC_URL: ${BACKEND_PUBLIC_URL:-http://localhost}
      SECURE_SSL_REDIRECT: ${SECURE_SSL_REDIRECT:-false}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost}
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
    container_name: saas-frontend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
    depends_on:
      backend:
        condition: service_started

  nginx:
    image: nginx:1.27-alpine
    container_name: saas-nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - backend_static:/static
      - backend_media:/media
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  backend_static:
  backend_media:
